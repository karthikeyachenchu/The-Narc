runtime: nodejs20
instance_class: F2

env_variables:
  VITE_OPENROUTER_API_KEY: "YOUR_API_KEY_HERE"

handlers:
  - url: /static
    static_dir: dist/static
    secure: always

  - url: /.*
    static_files: dist/index.html
    upload: dist/index.html
    secure: always

automatic_scaling:
  min_instances: 0
  max_instances: 2
  target_cpu_utilization: 0.65
